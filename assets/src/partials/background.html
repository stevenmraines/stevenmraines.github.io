<div id="error-box"></div>
<canvas id="bg-canvas"></canvas>

<!-- TODO background color seems lighter since I incorporated it with the rest of the page -->
<div id="bg-settings" class="hidden absolute left-0 top-0 h-full px-4 pt-18 z-2 text-left bg-dark-gray border-r-2 border-black">
    <button id="bg-settings-close" class="btn bg-viridian2 float-right">X</button>
    <div class="flex flex-col">
        <label>
            Fill Color
            <input type="color" value="#2c2a30" id="fill-color-input">
            <span id="fill-color-value">#2c2a30</span>
        </label>
        <label>
            Edge Color
            <input type="color" value="#29b1a5" id="edge-color-input">
            <span id="edge-color-value">#29b1a5</span>
        </label>
        <label>
            Highlight Color
            <input type="color" value="#ec8000" id="highlight-color-input">
            <span id="highlight-color-value">#ec8000</span>
        </label>
        <label>
            Fill Color Variation
            <input type="range" min="0" max="1" step=".01" value=".08" id="fill-color-variation-slider">
            <span id="fill-color-variation-value">0.35</span>
        </label>
        <label>
            Edge Thickness
            <input type="range" min="0" max="5" step=".05" value=".75" id="pixel-size-slider">
            <span id="pixel-size-value">2</span>
        </label>
        <label>
            X Segments
            <input type="range" min="1" max="100" step="1" value="26" id="x-segments-slider">
            <span id="x-segments-value">26</span>
        </label>
        <label>
            Y Segments
            <input type="range" min="1" max="100" step="1" value="16" id="y-segments-slider">
            <span id="y-segments-value">16</span>
        </label>
        <label>
            Triangulation Strength
            <input type="range" min="0" max="1" step="0.05" value="0.85" id="jitter-amount-slider">
            <span id="jitter-amount-value">0.85</span>
        </label>
        <label>
            Base Relief
            <input type="range" min="0" max="10" step="0.05" value="0.45" id="base-relief-slider">
            <span id="base-relief-value">0.45</span>
        </label>
        <label>
            Mouse Deform Radius
            <input type="range" min="0" max="10" step="0.05" value="3.75" id="mouse-deform-radius-slider">
            <span id="mouse-deform-radius-value">3</span>
        </label>
        <label>
            Mouse Deform Strength
            <input type="range" min="-10" max="10" step="0.05" value="0.95" id="mouse-deform-strength-slider">
            <span id="mouse-deform-strength-value">1.5</span>
        </label>
        <label>
            Mouse Edge Radius
            <input type="range" min="0" max="10" step="0.05" value="4" id="mouse-edge-radius-slider">
            <span id="mouse-edge-radius-value">4</span>
        </label>
        <label>
            Camera Distance
            <input type="range" min="0" max="100" step="0.5" value="10" id="camera-distance-slider">
            <span id="camera-distance-value">10</span>
        </label>
        <label>
            Ambient Light Color
            <input type="color" value="#ffffff" id="ambient-light-color-input">
            <span id="ambient-light-color-value">#ffffff</span>
        </label>
        <label>
            Directional Light Color
            <input type="color" value="#ffffff" id="directional-light-color-input">
            <span id="directional-light-color-value">#ffffff</span>
        </label>
        <label>
            Ambient Light Strength
            <input type="range" min="0" max="10" step="0.05" value="0.65" id="ambient-light-strength-slider">
            <span id="ambient-light-strength-value">10</span>
        </label>
        <label>
            Directional Light Strength
            <input type="range" min="0" max="10" step="0.05" value="0.8" id="directional-light-strength-slider">
            <span id="directional-light-strength-value">10</span>
        </label>
        <button id="reset" class="btn bg-viridian2" style="align-self: center; margin-top: 10px;">Reset</button>
    </div>
</div>
