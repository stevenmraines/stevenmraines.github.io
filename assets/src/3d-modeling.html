<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">

  <title>Steven Raines - 3D Modeling</title>

  <link rel="stylesheet" href="css/base.min.css" type="text/css">

  <!-- Let the browser know this page is optimized for mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
@@include('./partials/nav.html')
@@include('./partials/background.html')

<div class="content">
  <button id="icosphere-button" class="btn bg-viridian2">Icosphere</button>
  <button id="cube-button" class="btn bg-orange2">Cube</button>
  <button id="skull-button" class="btn bg-viridian2">Skull</button>
</div>

<canvas id="3d-viewer-canvas" class="absolute left-1/2 top-1/2 -translate-y-1/2 -translate-x-1/2 w-[900px] h-[600px] border-2 border-black"></canvas>

<div class="absolute left-1/2 top-1/2 -translate-y-1/2 -translate-x-1/2 w-[900px] h-[600px] pointer-events-none">
  <div class="relative h-[600px] text-light-gray pointer-events-none">
    <span class="absolute top-2 right-2 text-xs">
      Left click to pan
    </span>
    <span class="absolute top-5 right-2 text-xs">
      Left click + shift to rotate
    </span>
    <span class="absolute top-8 right-2 text-xs">
      Scroll to zoom
    </span>
    <label class="absolute top-2 left-2 pointer-events-auto">
      Wireframe
      <input type="checkbox" id="show-wireframe" />
    </label>
    <label class="absolute top-7 left-2 pointer-events-auto">
      Texture Preview
      <input type="checkbox" id="show-texture-preview" />
    </label>
    <!-- TODO Add a placeholder img, like "No Texture" or whatever -->
    <img src="#" id="texture-preview" class="absolute right-[2px] bottom-[2px] w-1/4 h-auto hidden" />
  </div>
</div>

<script src="js/main.min.js" type="module"></script>
</body>
</html>
