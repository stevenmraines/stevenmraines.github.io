<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tessellated Background Demo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #2c2a30;
        }
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            /*z-index: -1;*/
            /* FIXME looks like z-index was the reason I wasn't seeing anything */
            z-index: 9999;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        .content {
            position: relative;
            z-index: 1;
            color: #f5f3f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            pointer-events: none;
        }
        .content h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin: 0 0 0.5rem 0;
        }
        .content p {
            font-size: 1rem;
            opacity: 0.7;
            margin: 0;
        }
        .panel {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 1;
            color: #cfcdd2;
            font-family: monospace;
            font-size: 0.75rem;
            opacity: 0.6;
            line-height: 1.5;
        }
        #error-box {
            position: fixed;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            z-index: 999;
            background: #b00020;
            color: #fff;
            font-family: monospace;
            font-size: 0.8rem;
            padding: 1rem;
            white-space: pre-wrap;
            display: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="error-box"></div>
<canvas id="bg-canvas"></canvas>

<div class="content">
    <h1>Move your mouse around</h1>
    <p>Pixel-art tessellated background, powered by three.js</p>
</div>

<div class="panel">
    edge: #29b1a5 &middot; highlight: #ec8000 &middot; fill: #2c2a30
</div>

<script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
</script>

<script type="module">

    function showError(msg) {
        const box = document.getElementById("error-box");
        box.style.display = "block";
        box.textContent = "Error: " + msg;
        console.error(msg);
    }
    window.addEventListener("error", (e) => showError(e.message));

    try {

        const THREE = await import("three");

        const CONFIG = {
            fillColor: 0x2c2a30,
            edgeColor: 0x29b1a5,
            highlightColor: 0xec8000,

            pixelSize: 4,

            segmentsX: 26,
            segmentsY: 16,

            jitterAmount: 0.85,
            baseRelief: 0.45,

            mouseDeformRadius: 3.0,
            mouseDeformStrength: 1.6,
            mouseEdgeRadius: 2.4,

            cameraDistance: 10,
        };

        const canvas = document.getElementById("bg-canvas");
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(CONFIG.fillColor);

        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.set(0, 0, CONFIG.cameraDistance);
        camera.lookAt(0, 0, 0);

        function getPlaneSize() {
            const aspect = window.innerWidth / window.innerHeight;
            const vFov = (camera.fov * Math.PI) / 180;
            const visibleHeight = 2 * Math.tan(vFov / 2) * CONFIG.cameraDistance;
            const visibleWidth = visibleHeight * aspect;
            const overscan = 1.3;
            return { width: visibleWidth * overscan, height: visibleHeight * overscan };
        }

        let planeGeo, solidMesh, edgeMesh;
        let originalPositions;
        let currentPositions;

        const edgeUniforms = {
            uEdgeColor: { value: new THREE.Color(CONFIG.edgeColor) },
            uHighlightColor: { value: new THREE.Color(CONFIG.highlightColor) },
            uMouse: { value: new THREE.Vector3(9999, 9999, 9999) },
            uRadius: { value: CONFIG.mouseEdgeRadius },
        };

        function buildMesh() {
            if (solidMesh) {
                scene.remove(solidMesh);
                scene.remove(edgeMesh);
                planeGeo.dispose();
                solidMesh.material.dispose();
                edgeMesh.material.dispose();
            }

            const { width, height } = getPlaneSize();

            let geo = new THREE.PlaneGeometry(
                width,
                height,
                CONFIG.segmentsX,
                CONFIG.segmentsY
            );

            const pos = geo.attributes.position;
            const cellW = width / CONFIG.segmentsX;
            const cellH = height / CONFIG.segmentsY;

            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const y = pos.getY(i);

                const onEdgeX = Math.abs(x) >= width / 2 - 1e-4;
                const onEdgeY = Math.abs(y) >= height / 2 - 1e-4;

                let nx = x;
                let ny = y;
                let nz = (Math.random() - 0.5) * CONFIG.baseRelief;

                if (!onEdgeX) nx += (Math.random() - 0.5) * cellW * CONFIG.jitterAmount;
                if (!onEdgeY) ny += (Math.random() - 0.5) * cellH * CONFIG.jitterAmount;
                if (onEdgeX || onEdgeY) nz *= 0.3;

                pos.setXYZ(i, nx, ny, nz);
            }

            geo = geo.toNonIndexed();
            geo.computeVertexNormals();

            // Give each triangle a slight random tint around the base fill color so
            // facets are visually distinguishable, like the faceted look in the
            // reference image. Without this, flat shading on such a dark base color
            // produces almost no visible contrast between facets.
            const baseColor = new THREE.Color(CONFIG.fillColor);
            const colors = new Float32Array(geo.attributes.position.count * 3);
            const triCount = geo.attributes.position.count / 3;
            for (let t = 0; t < triCount; t++) {
                const variation = (Math.random() - 0.5) * 0.35; // +/- ~17% lightness
                const c = baseColor.clone();
                c.r = THREE.MathUtils.clamp(c.r + variation, 0, 1);
                c.g = THREE.MathUtils.clamp(c.g + variation, 0, 1);
                c.b = THREE.MathUtils.clamp(c.b + variation, 0, 1);
                for (let v = 0; v < 3; v++) {
                    const idx = (t * 3 + v) * 3;
                    colors[idx] = c.r;
                    colors[idx + 1] = c.g;
                    colors[idx + 2] = c.b;
                }
            }
            geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

            planeGeo = geo;

            originalPositions = Float32Array.from(planeGeo.attributes.position.array);
            currentPositions = Float32Array.from(originalPositions);

            const solidMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                vertexColors: true,
                flatShading: true,
                roughness: 0.9,
                metalness: 0.05,
            });
            solidMesh = new THREE.Mesh(planeGeo, solidMat);
            scene.add(solidMesh);

            const edgeMat = new THREE.ShaderMaterial({
                uniforms: edgeUniforms,
                wireframe: true,
                vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPos = worldPos.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
                fragmentShader: `
      uniform vec3 uEdgeColor;
      uniform vec3 uHighlightColor;
      uniform vec3 uMouse;
      uniform float uRadius;
      varying vec3 vWorldPos;
      void main() {
        float d = distance(vWorldPos, uMouse);
        float t = 1.0 - smoothstep(0.0, uRadius, d);
        vec3 color = mix(uEdgeColor, uHighlightColor, t);
        gl_FragColor = vec4(color, 1.0);
      }
    `,
            });
            edgeMesh = new THREE.Mesh(planeGeo, edgeMat);
            scene.add(edgeMesh);
        }

        buildMesh();

        const ambient = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(3, 5, 6);
        scene.add(dirLight);

        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            const lowW = Math.max(1, Math.floor(w / CONFIG.pixelSize));
            const lowH = Math.max(1, Math.floor(h / CONFIG.pixelSize));

            camera.aspect = w / h;
            camera.updateProjectionMatrix();

            renderer.setSize(lowW, lowH, false);

            buildMesh();
        }
        window.addEventListener("resize", onResize);
        onResize();

        const raycaster = new THREE.Raycaster();
        const mouseNDC = new THREE.Vector2(9999, 9999);
        const groundPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const mouseWorld = new THREE.Vector3(9999, 9999, 9999);
        let mouseActive = false;

        function updateMouseWorld() {
            raycaster.setFromCamera(mouseNDC, camera);
            const hit = raycaster.ray.intersectPlane(groundPlane, mouseWorld);
            if (!hit) mouseWorld.set(9999, 9999, 9999);
        }

        window.addEventListener("mousemove", (e) => {
            mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
            mouseActive = true;
            updateMouseWorld();
        });

        window.addEventListener("mouseleave", () => {
            mouseActive = false;
            mouseWorld.set(9999, 9999, 9999);
        });

        function updateDeformation() {
            const posAttr = planeGeo.attributes.position;
            const radius = CONFIG.mouseDeformRadius;
            const strength = CONFIG.mouseDeformStrength;

            for (let i = 0; i < posAttr.count; i++) {
                const ix = i * 3;
                const ox = originalPositions[ix];
                const oy = originalPositions[ix + 1];
                const oz = originalPositions[ix + 2];

                let targetZ = oz;

                if (mouseActive) {
                    const dx = ox - mouseWorld.x;
                    const dy = oy - mouseWorld.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < radius) {
                        const falloff = 1.0 - dist / radius;
                        const eased = falloff * falloff * (3 - 2 * falloff);
                        targetZ = oz + eased * strength;
                    }
                }

                currentPositions[ix + 2] += (targetZ - currentPositions[ix + 2]) * 0.12;
                posAttr.setZ(i, currentPositions[ix + 2]);
            }

            posAttr.needsUpdate = true;
            planeGeo.computeVertexNormals();

            if (mouseActive) {
                edgeUniforms.uMouse.value.set(mouseWorld.x, mouseWorld.y, mouseWorld.z);
            } else {
                edgeUniforms.uMouse.value.set(9999, 9999, 9999);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            updateDeformation();
            renderer.render(scene, camera);
        }
        animate();

    } catch (err) {
        showError(err.message + "\n" + (err.stack || ""));
    }

</script>

</body>
</html>
